<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="dragonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4621f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Dragon head -->
  <ellipse cx="50" cy="40" rx="25" ry="30" fill="url(#dragonGradient)"/>
  <!-- Dragon horn -->
  <polygon points="50,10 45,25 55,25" fill="url(#dragonGradient)"/>
  <!-- Dragon fire -->
  <path d="M 70 35 Q 85 30 90 40 Q 85 45 75 40" fill="#ff4500" opacity="0.8"/>
  <!-- Circle border -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#d4621f" stroke-width="2"/>
</svg>